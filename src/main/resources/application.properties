spring.application.name=inventarios
# Conexion mysql
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/inventario_db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:tu_password_local}
# Evitar que se cree el esquema de bd
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#banner
spring.main.banner-mode=off
# Configuración del logging en consola con el mismo patrón de Logback
logging.pattern.console=[%thread] %-5level: %logger - %msg%n
logging.level.root=INFO

# CONFIGURACIÓN DE SPRING MAIL (Ejemplo con Gmail)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true