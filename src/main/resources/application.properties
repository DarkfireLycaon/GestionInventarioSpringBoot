spring.application.name=inventarios

# Spring Boot buscar· autom·ticamente SPRING_DATASOURCE_URL, USERNAME y PASSWORD
# Si no las encuentra en Render, usar· los valores de localhost (despuÈs de los :)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/inventario_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Stardust3951.}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Evitar que se cree el esquema de bd

# banner
spring.main.banner-mode=off
# Configuracion del logging en consola
logging.pattern.console=[%thread] %-5level: %logger - %msg%n
logging.level.root=INFO

# CONFIGURACION DE SPRING MAIL
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
server.port=${PORT:8080}